<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Web Development Introduction</title>    
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rancho&effect=fire-animation">
    <style>
      h1 {
        font-family: 'Rancho', serif;
        font-size: 48px;
      }
    </style>
</head>

<body>
<div class="container" id="whole">
    
    <h1 id="title">Introduction to HTML, CSS and Bootstrap!</h1>
    <h3>1. 下载<a href="http://brackets.io/">Brackets</a>, 在Brackets中加入插件<a href="http://docs.emmet.io/cheat-sheet/">Emmet</a>, 和<a href="https://github.com/acbarbosa1964/acb-bootstrap-snippets">ACB Bootstrap Snippets</a></h3>
    <h3>2. 你的<a href="helloworld.html">第一个</a>网站, 什么是<a href="HTML.html">HTML</a>?</h3>
    <h3>3. 做<a href="helloworld-CSS.html">一个</a>会<span id="move">动</span>的网站, 什么是CSS? <a href="https://daneden.github.io/animate.css/">animate.css</a> / <a href="helloworld-planet.html">cosmos</a> / <a href="http://www.hongkiat.com/blog/css-text-effects/">effects</a> / <a href="https://developers.google.com/fonts/docs/getting_started">Google Fonts</a></h3> 
    <h3>4. 用<a href='http://getbootstrap.com/examples/theme/'>Bootstrap</a>做个<span id="cool">酷炫</span>的<a href="Hello%20Bootstrap.htm">个人网站</a> / <a href="http://getbootstrap.com/components/">Glyphicons<div class="glyphicon glyphicon-grain"></div></a></h3>
    
    <h2><span id="stop" class="hide">停</span></h2>
    <h2><span id="normal" class="hide">正常</span></h2>
    
</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.5/js/bootstrap.min.js"></script>

<script>
    var whole = $('#whole');
    var move = $('#move');
    var stop = $('#stop');
    var cool = $('#cool');
    var normal = $('#normal');
    var title = $('#title');
    move.on( "click", function(event){
        whole.addClass('infinite animated shake');
        stop.removeClass('hide');
    });
    stop.on("click", function(event){
        whole.removeClass('infinite animated shake');
        stop.addClass('hide');
             });
    cool.on( "click", function(event){
        title.addClass('font-effect-fire-animation');
        normal.removeClass('hide');
    });
    normal.on("click", function(event){
        title.removeClass('font-effect-fire-animation');
        normal.addClass('hide');
             });
</script>

</body>

</html>
